name: Deploy Key Vault

on:
  workflow_dispatch:
    inputs:
      target:
        description: GitHub Environment and Key Vault subscription/risk target.
        required: true
        type: choice
        options:
          - kv-dev
          - kv-qa
          - keys-prod
          - keys-shared
      deployment_class:
        description: App lifecycle vaults promote dev to qa to keys-prod; keys-only vaults deploy only to keys-shared.
        required: true
        type: choice
        options:
          - app-lifecycle
          - keys-only
      parameter_set:
        description: Base parameter set name, such as sample-app or department-shared.
        required: true
        type: string
        default: sample-app
      mode:
        description: Run only what-if, or what-if then deploy.
        required: true
        default: what-if-only
        type: choice
        options:
          - what-if-only
          - deploy

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: keyvault ${{ inputs.parameter_set }} to ${{ inputs.target }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment files
        id: files
        shell: pwsh
        run: |
          $target = "${{ inputs.target }}"
          $deploymentClass = "${{ inputs.deployment_class }}"
          $parameterSet = "${{ inputs.parameter_set }}"

          $appLifecycleTargets = @("kv-dev", "kv-qa", "keys-prod")
          if ($deploymentClass -eq "app-lifecycle" -and $target -notin $appLifecycleTargets) {
              throw "App lifecycle vaults can only deploy to: $($appLifecycleTargets -join ', ')."
          }

          if ($deploymentClass -eq "keys-only" -and $target -ne "keys-shared") {
              throw "Keys-only vaults can only deploy to keys-shared."
          }

          $templateFile = "infra/stacks/keyvault/main.bicep"
          $parameterFile = "infra/stacks/keyvault/params/$deploymentClass/$parameterSet.$target.bicepparam"

          if (!(Test-Path $templateFile)) {
              throw "Template file was not found: $templateFile"
          }

          if (!(Test-Path $parameterFile)) {
              throw "Parameter file was not found for this stack and target: $parameterFile"
          }

          "template-file=$templateFile" >> $env:GITHUB_OUTPUT
          "parameter-file=$parameterFile" >> $env:GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build
        run: az bicep build --file "${{ steps.files.outputs.template-file }}"

      - name: What-if
        run: |
          az deployment sub what-if \
            --location centralus \
            --template-file "${{ steps.files.outputs.template-file }}" \
            --parameters "${{ steps.files.outputs.parameter-file }}"

      - name: Deploy
        if: ${{ inputs.mode == 'deploy' }}
        run: |
          az deployment sub create \
            --location centralus \
            --template-file "${{ steps.files.outputs.template-file }}" \
            --parameters "${{ steps.files.outputs.parameter-file }}"
