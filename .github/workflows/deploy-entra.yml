name: Deploy Entra Conditional Access

on:
  workflow_dispatch:
    inputs:
      target:
        description: Approval boundary for the change.
        required: true
        type: choice
        options:
          - entra-report-only
          - entra-prod
      change_ticket:
        description: Required for entra-prod.
        required: false
        type: string
      mode:
        description: Plan only, or apply the requested state.
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

jobs:
  conditional-access:
    name: Conditional Access ${{ inputs.target }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require change ticket for production enablement
        if: ${{ inputs.target == 'entra-prod' && inputs.change_ticket == '' }}
        run: |
          echo "entra-prod requires a change ticket."
          exit 1

      - name: Azure login with federated managed identity
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Resolve target state
        id: target
        shell: pwsh
        run: |
          if ('${{ inputs.target }}' -eq 'entra-prod') {
            'state=enabled' >> $env:GITHUB_OUTPUT
          }
          else {
            'state=reportOnly' >> $env:GITHUB_OUTPUT
          }

      - name: Export current Conditional Access state
        if: ${{ inputs.mode == 'apply' }}
        shell: pwsh
        run: ./scripts/reporting/Export-TenantState.ps1 -OutputPath tenant-state-export.json

      - name: Upload tenant export
        if: ${{ inputs.mode == 'apply' }}
        uses: actions/upload-artifact@v7
        with:
          name: tenant-state-export-${{ inputs.target }}
          path: tenant-state-export.json
          if-no-files-found: ignore

      - name: Deploy Conditional Access policies
        uses: ./.github/actions/deploy-conditional-access
        with:
          policy-path: identity/conditional-access/policies
          target-state: ${{ steps.target.outputs.state }}
          mode: ${{ inputs.mode }}
          change-ticket: ${{ inputs.change_ticket }}
